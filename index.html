<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻將戰績簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<!-- Firebase CDN (compat version - most reliable) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
:root{--green:#1a4a2e;--gold:#c9a84c;--gold-light:#e2c46e;--cream:#f5edd6;--red-light:#e74c3c;--ink:#1a1208;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif TC',serif;background-color:var(--green);background-image:radial-gradient(ellipse at 20% 20%,rgba(61,138,90,0.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(26,74,46,0.8) 0%,transparent 60%),repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.015) 20px,rgba(255,255,255,0.015) 21px);min-height:100vh;color:var(--cream);}
nav{background:rgba(10,30,18,0.92);border-bottom:2px solid var(--gold);padding:0 1.5rem;display:flex;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.nav-brand{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--gold);padding:1rem 1.2rem 1rem 0;border-right:1px solid rgba(201,168,76,0.3);margin-right:0.5rem;white-space:nowrap;flex-shrink:0;}
.nav-tabs{display:flex;flex:1;overflow-x:auto;}
.nav-tab{padding:1.1rem 0.9rem;cursor:pointer;font-size:0.84rem;color:rgba(245,237,214,0.6);border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap;flex-shrink:0;}
.nav-tab:hover{color:var(--cream);}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-admin{margin-left:auto;flex-shrink:0;padding-left:0.5rem;display:flex;align-items:center;gap:0.6rem;}
.admin-avatar{width:28px;height:28px;border-radius:50%;border:1px solid var(--gold);display:none;}
.btn-login{background:transparent;border:1px solid var(--gold);color:var(--gold);padding:0.4rem 0.9rem;border-radius:3px;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:0.8rem;transition:all 0.2s;white-space:nowrap;}
.btn-login:hover{background:var(--gold);color:var(--ink);}
.page{display:none;padding:2rem;max-width:1100px;margin:0 auto;}
.page.active{display:block;}
.section-title{font-family:'Playfair Display',serif;font-size:1.75rem;color:var(--gold);margin-bottom:0.3rem;}
.section-subtitle{font-size:0.83rem;color:rgba(245,237,214,0.5);margin-bottom:2rem;letter-spacing:0.06em;}
.card{background:rgba(10,30,18,0.75);border:1px solid rgba(201,168,76,0.25);border-radius:6px;padding:1.5rem;}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:rgba(10,30,18,0.8);border:1px solid rgba(201,168,76,0.3);border-radius:6px;padding:1.2rem;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light));}
.stat-icon{font-size:1.5rem;margin-bottom:0.4rem;}
.stat-label{font-size:0.72rem;color:rgba(245,237,214,0.5);letter-spacing:0.08em;margin-bottom:0.2rem;}
.stat-value{font-size:1.5rem;font-weight:700;color:var(--gold);}
.stat-sub{font-size:0.74rem;color:rgba(245,237,214,0.45);margin-top:0.15rem;}
.recent-card{margin-bottom:1.5rem;}
.player-row{display:flex;align-items:center;padding:0.6rem 0;border-bottom:1px solid rgba(201,168,76,0.1);gap:1rem;}
.player-row:last-child{border-bottom:none;}
.player-rank{font-size:1.05rem;width:2rem;text-align:center;}
.player-name{flex:1;font-size:0.93rem;}
.player-score{font-size:1rem;font-weight:700;min-width:80px;text-align:right;}
.pos{color:#5dba7d;}.neg{color:var(--red-light);}
.player-tsumo{font-size:0.78rem;color:rgba(245,237,214,0.4);min-width:70px;text-align:right;}
.year-kings{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}
.lb-controls{display:flex;gap:0.7rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.filter-group{display:flex;border:1px solid rgba(201,168,76,0.3);border-radius:4px;overflow:hidden;}
.filter-btn{padding:0.42rem 0.8rem;background:transparent;border:none;border-right:1px solid rgba(201,168,76,0.2);color:rgba(245,237,214,0.55);cursor:pointer;font-family:'Noto Serif TC',serif;font-size:0.8rem;transition:all 0.15s;}
.filter-btn:last-child{border-right:none;}
.filter-btn:hover{background:rgba(201,168,76,0.1);color:var(--cream);}
.filter-btn.active{background:var(--gold);color:var(--ink);font-weight:700;}
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{padding:0.65rem 1rem;text-align:left;font-size:0.76rem;color:var(--gold);letter-spacing:0.08em;border-bottom:2px solid rgba(201,168,76,0.3);white-space:nowrap;}
.lb-table td{padding:0.65rem 1rem;font-size:0.88rem;border-bottom:1px solid rgba(201,168,76,0.08);}
.lb-table tr:hover td{background:rgba(201,168,76,0.05);}
.rank-cell{text-align:center;width:50px;}
.score-cell{font-weight:700;}
.history-filters{display:flex;gap:0.7rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
.search-input{background:rgba(10,30,18,0.7);border:1px solid rgba(201,168,76,0.3);color:var(--cream);padding:0.48rem 1rem;border-radius:4px;font-family:'Noto Serif TC',serif;font-size:0.86rem;outline:none;width:175px;}
.search-input:focus{border-color:var(--gold);}
.search-input::placeholder{color:rgba(245,237,214,0.28);}
.session-card{background:rgba(10,30,18,0.7);border:1px solid rgba(201,168,76,0.18);border-radius:6px;margin-bottom:0.7rem;overflow:hidden;transition:border-color 0.2s;}
.session-card:hover{border-color:rgba(201,168,76,0.38);}
.session-header{display:flex;align-items:center;padding:0.8rem 1.2rem;cursor:pointer;gap:0.8rem;}
.session-date-badge{background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);color:var(--gold);padding:0.18rem 0.55rem;border-radius:3px;font-size:0.76rem;white-space:nowrap;}
.session-players{flex:1;font-size:0.84rem;color:rgba(245,237,214,0.62);}
.session-winner{font-size:0.84rem;color:#5dba7d;white-space:nowrap;}
.session-toggle{color:rgba(201,168,76,0.45);transition:transform 0.2s;font-size:0.72rem;}
.session-card.open .session-toggle{transform:rotate(180deg);}
.session-detail{display:none;padding:0 1.2rem 1.2rem;}
.session-card.open .session-detail{display:block;}
.session-detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.45rem;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:0.48rem 0.8rem;background:rgba(255,255,255,0.03);border-radius:3px;}
.detail-name{font-size:0.86rem;}
.detail-stats{display:flex;gap:0.9rem;font-size:0.83rem;}
.form-group{display:flex;flex-direction:column;gap:0.4rem;}
.form-label{font-size:0.78rem;color:var(--gold);letter-spacing:0.04em;}
.form-input,.form-select{background:rgba(10,30,18,0.7);border:1px solid rgba(201,168,76,0.3);color:var(--cream);padding:0.58rem 0.9rem;border-radius:4px;font-family:'Noto Serif TC',serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-select:focus{border-color:var(--gold);}
.form-select option{background:#1a4a2e;}
.player-input-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:0.75rem;align-items:end;margin-bottom:0.75rem;}
.player-num{width:26px;height:26px;background:rgba(201,168,76,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.78rem;color:var(--gold);}
.btn-primary{background:var(--gold);color:var(--ink);border:none;padding:0.65rem 1.8rem;border-radius:4px;font-family:'Noto Serif TC',serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-1px);}
.btn-danger{background:transparent;border:1px solid #c0392b;color:var(--red-light);padding:0.32rem 0.65rem;border-radius:4px;cursor:pointer;font-size:0.78rem;transition:all 0.2s;}
.btn-danger:hover{background:#c0392b;color:white;}
.btn-approve{background:rgba(93,186,125,0.15);border:1px solid #5dba7d;color:#5dba7d;padding:0.32rem 0.75rem;border-radius:4px;cursor:pointer;font-size:0.8rem;transition:all 0.2s;}
.btn-approve:hover{background:#5dba7d;color:var(--ink);}
.btn-secondary{background:transparent;border:1px solid rgba(245,237,214,0.28);color:rgba(245,237,214,0.65);padding:0.52rem 1.1rem;border-radius:4px;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:0.86rem;transition:all 0.2s;}
.btn-secondary:hover{border-color:var(--cream);color:var(--cream);}
.notice{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-left:3px solid var(--gold);padding:0.75rem 1rem;font-size:0.82rem;color:rgba(245,237,214,0.7);border-radius:0 4px 4px 0;margin-bottom:1.5rem;}
.pending-item{background:rgba(10,30,18,0.7);border:1px solid rgba(201,168,76,0.2);border-radius:6px;padding:1.1rem;margin-bottom:0.9rem;display:flex;gap:1rem;align-items:flex-start;}
.pending-info{flex:1;}
.pending-date{font-size:0.76rem;color:var(--gold);margin-bottom:0.3rem;}
.pending-players-list{font-size:0.84rem;color:rgba(245,237,214,0.68);line-height:1.65;}
.pending-actions{display:flex;gap:0.5rem;flex-shrink:0;}
.empty-state{text-align:center;padding:3rem;color:rgba(245,237,214,0.32);font-size:0.88rem;}
.empty-icon{font-size:2.5rem;margin-bottom:0.8rem;}
.loading-overlay{position:fixed;inset:0;background:rgba(10,30,18,0.9);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:var(--gold);font-size:0.9rem;}
.tile-deco{position:fixed;bottom:2rem;right:2rem;opacity:0.055;font-size:5rem;pointer-events:none;user-select:none;letter-spacing:-0.1em;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gold);color:var(--ink);padding:0.65rem 1.4rem;border-radius:4px;font-size:0.88rem;font-weight:700;transition:transform 0.3s;z-index:300;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.tsumo-note{font-size:0.73rem;color:rgba(245,237,214,0.33);font-style:italic;margin-top:0.7rem;padding-left:0.3rem;}
@media(max-width:750px){.dash-grid{grid-template-columns:1fr 1fr;}.year-kings{grid-template-columns:1fr;}.player-input-row{grid-template-columns:1fr 1fr;}.session-detail-grid{grid-template-columns:1fr;}.nav-brand{font-size:1rem;padding-right:0.7rem;}}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">連線中…</div>
</div>

<nav>
  <div class="nav-brand">🀄 麻將戰績簿</div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="showPage('dashboard',this)">總覽</div>
    <div class="nav-tab" onclick="showPage('leaderboard',this)">排行榜</div>
    <div class="nav-tab" onclick="showPage('history',this)">場次記錄</div>
    <div class="nav-tab" onclick="showPage('submit',this)">新增戰績</div>
    <div class="nav-tab" id="adminTab" onclick="showPage('admin',this)" style="display:none">管理員</div>
  </div>
  <div class="nav-admin">
    <img class="admin-avatar" id="adminAvatar">
    <button class="btn-login" id="loginBtn" onclick="handleAuth()">Google 登入</button>
  </div>
</nav>

<div class="page active" id="page-dashboard">
  <div class="section-title">總覽</div>
  <div class="section-subtitle">DASHBOARD · 戰況一覽</div>
  <div class="dash-grid" id="dashStats"></div>
  <div class="card recent-card">
    <div style="margin-bottom:1.2rem">
      <div style="font-size:1rem;font-weight:700;color:var(--gold-light)">最近一場</div>
      <div style="font-size:0.8rem;color:var(--gold-light);margin-top:0.1rem" id="recentDate">—</div>
    </div>
    <div id="recentPlayers"></div>
  </div>
  <div class="year-kings">
    <div class="card"><div style="font-size:0.76rem;color:var(--gold);letter-spacing:0.08em;margin-bottom:1rem;">🏆 年度麻將王</div><div id="yearlyWinner"></div></div>
    <div class="card"><div style="font-size:0.76rem;color:var(--gold);letter-spacing:0.08em;margin-bottom:1rem;">🎯 年度自摸王</div><div id="yearlyTsumo"></div></div>
  </div>
</div>

<div class="page" id="page-leaderboard">
  <div class="section-title">排行榜</div>
  <div class="section-subtitle">LEADERBOARD · 英雄榜</div>
  <div class="lb-controls">
    <div class="filter-group">
      <button class="filter-btn active" onclick="setLbFilter('period','all',this)">全部</button>
      <button class="filter-btn" onclick="setLbFilter('period','2024',this)">2024</button>
      <button class="filter-btn" onclick="setLbFilter('period','2025',this)">2025</button>
      <button class="filter-btn" onclick="setLbFilter('period','2026',this)">2026</button>
      <button class="filter-btn" onclick="setLbFilter('period','quarter',this)">本季</button>
      <button class="filter-btn" onclick="setLbFilter('period','month',this)">本月</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setLbFilter('type','score',this)">勝負分</button>
      <button class="filter-btn" onclick="setLbFilter('type','tsumo',this)">自摸次數</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setLbFilter('order','desc',this)">↓ 降冪</button>
      <button class="filter-btn" onclick="setLbFilter('order','asc',this)">↑ 升冪</button>
    </div>
  </div>
  <div class="card">
    <table class="lb-table">
      <thead><tr><th style="width:50px">排名</th><th>玩家</th><th style="text-align:right">勝負分</th><th style="text-align:right">自摸次數</th><th style="text-align:right">場次</th><th style="text-align:right">場均勝負</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
  <div class="tsumo-note">＊自摸次數僅 2026 年起有記錄</div>
</div>

<div class="page" id="page-history">
  <div class="section-title">場次記錄</div>
  <div class="section-subtitle">HISTORY · 每場詳情（共 <span id="histCount">—</span> 場）</div>
  <div class="history-filters">
    <input class="search-input" type="text" placeholder="搜尋玩家名稱…" oninput="renderHistory()" id="historySearch">
    <div class="filter-group">
      <button class="filter-btn active" onclick="setHistoryFilter('all',this)">全部</button>
      <button class="filter-btn" onclick="setHistoryFilter('2024',this)">2024</button>
      <button class="filter-btn" onclick="setHistoryFilter('2025',this)">2025</button>
      <button class="filter-btn" onclick="setHistoryFilter('2026',this)">2026</button>
      <button class="filter-btn" onclick="setHistoryFilter('month',this)">本月</button>
    </div>
  </div>
  <div id="historyList"></div>
</div>

<div class="page" id="page-submit">
  <div class="section-title">新增戰績</div>
  <div class="section-subtitle">RECORD · 填寫場次資料</div>
  <div class="notice">填寫後送出，待管理員審核後公開顯示。</div>
  <div class="card">
    <div class="form-group" style="max-width:220px;margin-bottom:0.5rem"><label class="form-label">日期</label><input class="form-input" type="date" id="f-date"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin:1.5rem 0 1rem;">
      <div style="font-size:0.88rem;color:var(--gold)">四位參賽者</div>
      <button class="btn-secondary" style="font-size:0.78rem;padding:0.3rem 0.8rem" onclick="showAddPlayerModal()">＋ 新增玩家</button>
    </div>
    <div id="playerInputs"></div>
    <div style="margin-top:1.5rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
      <button class="btn-primary" onclick="submitRecord()">送出等待審核</button>
      <div style="font-size:0.8rem;color:rgba(245,237,214,0.38)">四名玩家勝負分合計須為 0</div>
    </div>
  </div>
</div>

<div class="page" id="page-admin">
  <div class="section-title">管理員區</div>
  <div class="section-subtitle">ADMIN · 審核戰績</div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
    <div style="font-size:0.88rem;color:rgba(245,237,214,0.6)">登入身份：<span style="color:var(--gold)" id="adminEmail"></span> <span id="adminRoleBadge"></span></div>
    <button class="btn-secondary" onclick="handleAuth()">登出</button>
  </div>
  <div style="font-size:0.88rem;color:var(--gold);margin-bottom:1rem;">⏳ 待審核 (<span id="pendingCount">0</span>)</div>
  <div id="pendingList"></div>
  <div id="approvedSection">
    <div style="font-size:0.88rem;color:var(--gold);margin:2rem 0 1rem;">✅ 已審核 — 最近 10 場</div>
    <div id="approvedManage"></div>
  </div>
  <div id="subAdminSection" style="display:none">
    <div style="font-size:0.88rem;color:var(--gold);margin:2rem 0 1rem;">👥 副管理員名單</div>
    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;gap:0.8rem;align-items:flex-end;flex-wrap:wrap;">
        <div class="form-group" style="flex:1;min-width:200px">
          <label class="form-label">新增副管理員 Gmail</label>
          <input class="form-input" type="email" id="newSubAdminEmail" placeholder="friend@gmail.com">
        </div>
        <button class="btn-primary" style="padding:0.58rem 1.2rem" onclick="addSubAdmin()">新增</button>
      </div>
    </div>
    <div id="subAdminList"></div>
  </div>
</div>

<!-- Add Player Modal -->
<div id="addPlayerModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#0e2a1a;border:1px solid var(--gold);border-radius:8px;padding:2rem;width:340px;max-width:92vw;">
    <div style="font-family:Playfair Display,serif;color:var(--gold);font-size:1.2rem;margin-bottom:1.2rem;">新增玩家</div>
    <div class="form-group">
      <label class="form-label">玩家名稱</label>
      <input class="form-input" id="newPlayerName" type="text" placeholder="輸入名字" maxlength="10">
    </div>
    <div style="display:flex;gap:0.8rem;justify-content:flex-end;margin-top:1.4rem;">
      <button class="btn-secondary" onclick="closeAddPlayerModal()">取消</button>
      <button class="btn-primary" onclick="addNewPlayer()">新增</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="tile-deco">🀇🀙🀡🀄</div>

<script>
// ── Firebase Init ──
const firebaseConfig = {
  apiKey: "AIzaSyD1nQu5AP4B987ORSNU6kaZ2tXdyd_ejUE",
  authDomain: "mahjong-tracker-13b5b.firebaseapp.com",
  projectId: "mahjong-tracker-13b5b",
  storageBucket: "mahjong-tracker-13b5b.firebasestorage.app",
  messagingSenderId: "1089370572162",
  appId: "1:1089370572162:web:6a6b2ffb5c6480fb70fb9b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const ADMIN_EMAIL = 'jtty1234@gmail.com';
let subAdmins = []; // loaded from Firestore

async function loadSubAdmins(){
  const snap = await db.collection('admins').get();
  subAdmins = snap.docs.map(d=>d.data().email);
}

function isSubAdmin(email){
  return subAdmins.includes(email);
}

function canAccessAdmin(email){
  return email === ADMIN_EMAIL || isSubAdmin(email);
}
let PLAYERS = ['楊湛華','林翔','陳廷安','吳致亨','陳威宇','劉其鷹','楊皓淵','陳昀瑋','傅柏文','陳奕廷','朱曼寧','廖冠茗','倪周恩','鄭以湉','郭易非','蔡元傑','其他人'];

let allRecords = [];
let currentUser = null;
let lbF = {period:'all',type:'score',order:'desc'};
let histP = 'all';

// ── Helpers ──
function isOther(n){return n.includes('其他');}
function fmt(n){return(n>0?'+':'')+n;}
function fd(d){return d.replace(/-/g,'.');}
function medal(i){if(i===0)return'🥇';if(i===1)return'🥈';if(i===2)return'🥉';return'<span style="color:rgba(245,237,214,0.4);font-size:0.83rem">'+(i+1)+'</span>';}
function hideLoading(){document.getElementById('loadingOverlay').style.display='none';}
function setLoadingText(t){document.getElementById('loadingText').textContent=t;}

function byPeriod(recs,p){
  const now=new Date();
  return recs.filter(r=>{
    const d=new Date(r.date);
    if(p==='2024')return d.getFullYear()===2024;
    if(p==='2025')return d.getFullYear()===2025;
    if(p==='2026')return d.getFullYear()===2026;
    if(p==='year')return d.getFullYear()===now.getFullYear();
    if(p==='quarter'){const q=Math.floor(now.getMonth()/3);return d.getFullYear()===now.getFullYear()&&Math.floor(d.getMonth()/3)===q;}
    if(p==='month')return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
    return true;
  });
}
function agg(recs){
  const m={};
  recs.forEach(r=>r.players.forEach(p=>{
    if(!m[p.n])m[p.n]={name:p.n,score:0,tsumo:0,tg:0,games:0};
    m[p.n].score+=p.s;m[p.n].games++;
    if(p.t!=null){m[p.n].tsumo+=p.t;m[p.n].tg++;}
  }));
  return Object.values(m);
}

}

// ── Sub-admin management ──
async function addSubAdmin(){
  const email = document.getElementById('newSubAdminEmail').value.trim();
  if(!email){toast('請輸入 Email');return;}
  if(email===ADMIN_EMAIL){toast('這是主管理員帳號');return;}
  if(subAdmins.includes(email)){toast('已在名單中');return;}
  await db.collection('admins').add({email, addedAt: new Date().toISOString()});
  document.getElementById('newSubAdminEmail').value='';
  toast('✅ 已新增副管理員');
  await loadSubAdmins();
  await renderAdmin();
}

async function removeSubAdmin(email){
  if(!confirm('確認移除 '+email+' 的副管理員權限？'))return;
  const snap = await db.collection('admins').where('email','==',email).get();
  snap.docs.forEach(d=>d.ref.delete());
  toast('已移除');
  await loadSubAdmins();
  await renderAdmin();
}

// ── Players list ──
async function loadPlayers(){
  const snap = await db.collection('players').orderBy('addedAt','asc').get();
  const extra = snap.docs.map(d=>d.data().name);
  extra.forEach(n=>{ if(!PLAYERS.includes(n)) PLAYERS.push(n); });
}

function showAddPlayerModal(){
  document.getElementById('newPlayerName').value='';
  document.getElementById('addPlayerModal').style.display='flex';
  setTimeout(()=>document.getElementById('newPlayerName').focus(),100);
}

function closeAddPlayerModal(){
  document.getElementById('addPlayerModal').style.display='none';
}

async function addNewPlayer(){
  const name = document.getElementById('newPlayerName').value.trim();
  if(!name){toast('請輸入名稱');return;}
  if(PLAYERS.includes(name)){toast('此玩家已在名單中');closeAddPlayerModal();return;}
  try{
    await db.collection('players').add({name, addedAt: new Date().toISOString()});
    PLAYERS.splice(PLAYERS.length-1, 0, name); // insert before 其他人
    toast('✅ 已新增 '+name);
    closeAddPlayerModal();
    renderForm(); // refresh dropdowns
  }catch(e){toast('新增失敗：'+e.message);}
}

async function seedIfEmpty(){
  setLoadingText('檢查資料庫…');
  await loadPlayers();
  const snap = await db.collection('records').limit(1).get();
  if(!snap.empty){ await loadRecords(); return; }
  setLoadingText('首次載入，匯入歷史資料…');
  for(let i=0;i<SEED.length;i+=10){
    const chunk=SEED.slice(i,i+10);
    const batch=db.batch();
    chunk.forEach(r=>batch.set(db.collection('records').doc(),{...r,status:'approved',createdAt:new Date().toISOString()}));
    await batch.commit();
    setLoadingText('匯入中… '+(i+chunk.length)+'/'+SEED.length);
  }
  await loadRecords();
  toast('✅ 歷史資料匯入完成！');
}

  const btn=document.getElementById('loginBtn');

      const isMain = user.email===ADMIN_EMAIL;
      document.getElementById('adminRoleBadge').innerHTML=isMain
        ? '<span style="background:rgba(201,168,76,0.2);border:1px solid var(--gold);color:var(--gold);padding:0.1rem 0.5rem;border-radius:3px;font-size:0.72rem">主管理員</span>'
        : '<span style="background:rgba(93,186,125,0.15);border:1px solid #5dba7d;color:#5dba7d;padding:0.1rem 0.5rem;border-radius:3px;font-size:0.72rem">副管理員</span>';
    }
  } else {
    btn.textContent='Google 登入';
    avatar.style.display='none';
    adminTab.style.display='none';
  }
});

function handleAuth(){
  if(currentUser){auth.signOut();toast('已登出');}
  else{auth.signInWithPopup(provider).then(()=>toast('✅ 登入成功')).catch(e=>toast('登入失敗：'+e.message));}
}

// ── Nav ──
function showPage(n,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  el.classList.add('active');
  if(n==='dashboard')renderDash();
  if(n==='leaderboard')renderLB();
  if(n==='history')renderHistory();
  if(n==='submit')renderForm();
  if(n==='admin')renderAdmin();
}

// ── Dashboard ──
function renderDash(){
  const app=allRecords.filter(r=>r.status==='approved').sort((a,b)=>b.date.localeCompare(a.date));
  const allP=agg(app);
  const tt=allP.reduce((s,p)=>s+p.tsumo,0);
  document.getElementById('dashStats').innerHTML=
    '<div class="stat-card"><div class="stat-icon">🎴</div><div class="stat-label">總場次</div><div class="stat-value">'+app.length+'</div></div>'+
    '<div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">常駐玩家</div><div class="stat-value">'+allP.filter(p=>!isOther(p.name)).length+'</div></div>'+
    '<div class="stat-card"><div class="stat-icon">📅</div><div class="stat-label">跨越年份</div><div class="stat-value">3</div><div class="stat-sub">2024 · 2025 · 2026</div></div>'+
    '<div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-label">已記自摸</div><div class="stat-value">'+tt+'</div><div class="stat-sub">2026 年起</div></div>';
  if(app.length){
    const r=app[0];
    document.getElementById('recentDate').textContent=fd(r.date);
    const s=[...r.players].sort((a,b)=>b.s-a.s);
    document.getElementById('recentPlayers').innerHTML=s.map((p,i)=>
      '<div class="player-row"><div class="player-rank">'+medal(i)+'</div><div class="player-name">'+p.n+'</div>'+
      '<div class="player-score '+(p.s>0?'pos':p.s<0?'neg':'')+'">'+fmt(p.s)+' 元</div>'+
      '<div class="player-tsumo">'+(p.t!=null?'自摸 '+p.t+' 次':'')+'</div></div>').join('');
  }
  const ya=byPeriod(app,'year');
  const yp=agg(ya).filter(p=>!isOther(p.name)).sort((a,b)=>b.score-a.score);
  const yt=agg(ya).filter(p=>!isOther(p.name)&&p.tg>0).sort((a,b)=>b.tsumo-a.tsumo);
  document.getElementById('yearlyWinner').innerHTML=yp[0]?'<div style="font-size:1.3rem;margin-bottom:0.4rem">🏆</div><strong style="color:var(--gold-light);font-size:1.05rem">'+yp[0].name+'</strong><div style="color:#5dba7d;margin-top:0.3rem">'+fmt(yp[0].score)+' 元 · '+yp[0].games+' 場</div>':'<span style="color:rgba(245,237,214,0.3)">尚無資料</span>';
  document.getElementById('yearlyTsumo').innerHTML=yt[0]?'<div style="font-size:1.3rem;margin-bottom:0.4rem">🎯</div><strong style="color:var(--gold-light);font-size:1.05rem">'+yt[0].name+'</strong><div style="color:#5dba7d;margin-top:0.3rem">'+yt[0].tsumo+' 次 · '+yt[0].tg+' 場</div>':'<span style="color:rgba(245,237,214,0.3)">無自摸紀錄</span>';
}

// ── Leaderboard ──
function setLbFilter(k,v,btn){
  lbF[k]=v;
  btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderLB();
}
function renderLB(){
  const recs=byPeriod(allRecords.filter(r=>r.status==='approved'),lbF.period);
  let ps=agg(recs).filter(p=>!isOther(p.name));
  const k=lbF.type==='score'?'score':'tsumo';
  ps.sort((a,b)=>lbF.order==='desc'?b[k]-a[k]:a[k]-b[k]);
  document.getElementById('lbBody').innerHTML=ps.map((p,i)=>
    '<tr><td class="rank-cell">'+medal(i)+'</td><td>'+p.name+'</td>'+
    '<td class="score-cell '+(p.score>0?'pos':p.score<0?'neg':'')+'" style="text-align:right">'+fmt(p.score)+'</td>'+
    '<td style="text-align:right;color:rgba(245,237,214,0.6)">'+(p.tg>0?p.tsumo:'—')+'</td>'+
    '<td style="text-align:right;color:rgba(245,237,214,0.5)">'+p.games+'</td>'+
    '<td style="text-align:right;color:rgba(245,237,214,0.6)">'+(p.games?fmt(Math.round(p.score/p.games)):'—')+'</td></tr>').join('')
    ||'<tr><td colspan="6" style="text-align:center;color:rgba(245,237,214,0.3);padding:2rem">無資料</td></tr>';
}

// ── History ──
function setHistoryFilter(p,btn){
  histP=p;
  btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderHistory();
}
function renderHistory(){
  const search=(document.getElementById('historySearch')?.value||'').trim().toLowerCase();
  let recs=byPeriod(allRecords.filter(r=>r.status==='approved'),histP)
    .filter(r=>!search||r.players.some(p=>p.n.toLowerCase().includes(search)))
    .sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('histCount').textContent=recs.length;
  if(!recs.length){document.getElementById('historyList').innerHTML='<div class="empty-state"><div class="empty-icon">🀄</div>找不到符合的場次</div>';return;}
  document.getElementById('historyList').innerHTML=recs.map(r=>{
    const s=[...r.players].sort((a,b)=>b.s-a.s);
    const hasTsumo=r.players.some(p=>p.t!=null);
    return '<div class="session-card" id="sc-'+r.id+'">'+
      '<div class="session-header" onclick="tog(\''+r.id+'\')">'+
      '<div class="session-date-badge">'+fd(r.date)+'</div>'+
      '<div class="session-players">'+r.players.map(p=>p.n).join('・')+'</div>'+
      '<div class="session-winner">🏆 '+s[0].n+' '+fmt(s[0].s)+'</div>'+
      '<div class="session-toggle">▼</div></div>'+
      '<div class="session-detail"><div class="session-detail-grid">'+
      s.map((p,i)=>'<div class="detail-row"><div class="detail-name">'+medal(i)+' '+p.n+'</div>'+
        '<div class="detail-stats"><span style="font-weight:700;'+(p.s>0?'color:#5dba7d':p.s<0?'color:var(--red-light)':'')+'">'+fmt(p.s)+' 元</span>'+
        (hasTsumo&&p.t!=null?'<span style="color:rgba(245,237,214,0.42)">自摸 '+p.t+' 次</span>':'')+
        '</div></div>').join('')+
      '</div></div></div>';
  }).join('');
}
function tog(id){document.getElementById('sc-'+id).classList.toggle('open');}

// ── Submit ──
function renderForm(){
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  const opts=PLAYERS.map(p=>'<option value="'+p+'">'+p+'</option>').join('');
  document.getElementById('playerInputs').innerHTML=[1,2,3,4].map(i=>
    '<div class="player-input-row">'+
    '<div class="form-group"><label class="form-label">玩家 '+i+'</label><select class="form-select" id="fp-n-'+i+'">'+opts+'</select></div>'+
    '<div class="form-group"><label class="form-label">勝負分</label><input class="form-input" type="number" id="fp-s-'+i+'" value="0"></div>'+
    '<div class="form-group"><label class="form-label">自摸次數</label><input class="form-input" type="number" id="fp-t-'+i+'" value="0" min="0"></div>'+
    '<div class="player-num">'+i+'</div></div>').join('');
  [0,1,2,3].forEach(i=>document.getElementById('fp-n-'+(i+1)).selectedIndex=i);
}
async function submitRecord(){
  const date=document.getElementById('f-date').value;
  if(!date){toast('請填寫日期');return;}
  const ps=[1,2,3,4].map(i=>({n:document.getElementById('fp-n-'+i).value,s:parseInt(document.getElementById('fp-s-'+i).value)||0,t:parseInt(document.getElementById('fp-t-'+i).value)||0}));
  if(new Set(ps.map(p=>p.n)).size!==4){toast('四位玩家不可重複');return;}
  if(ps.reduce((s,p)=>s+p.s,0)!==0){toast('勝負分總和須為 0');return;}
  try{
    await db.collection('pending').add({date,players:ps,status:'pending',createdAt:new Date().toISOString()});
    toast('✅ 已送出，等待管理員審核');renderForm();
  }catch(e){toast('送出失敗：'+e.message);}
}

// ── Admin ──
async function renderAdmin(){
  const email = currentUser?.email || '';
  const isMain = email === 'jtty1234@gmail.com';
  const isSub = subAdmins.includes(email);
  if(!isMain && !isSub){toast('需要管理員權限');return;}

  // 待審核（主管理員＋副管理員都看得到）
  const snap=await db.collection('pending').orderBy('createdAt','desc').get();
  const pend=snap.docs.map(d=>({id:d.id,...d.data()}));
  document.getElementById('pendingCount').textContent=pend.length;
  document.getElementById('pendingList').innerHTML=pend.length?pend.map(r=>
    '<div class="pending-item"><div class="pending-info">'+
    '<div class="pending-date">📅 '+fd(r.date)+'</div>'+
    '<div class="pending-players-list">'+r.players.map(p=>p.n+' '+fmt(p.s)+'元').join(' ｜ ')+'</div></div>'+
    '<div class="pending-actions">'+
    '<button class="btn-approve" onclick="approveR(\''+r.id+'\','+JSON.stringify(r.date)+','+JSON.stringify(r.players)+')">✓ 批准</button>'+
    '<button class="btn-danger" onclick="rejectR(\''+r.id+'\')">✗ 拒絕</button>'+
    '</div></div>').join(''):'<div class="empty-state"><div class="empty-icon">✅</div>目前無待審核場次</div>';

  // 已審核＋副管理員名單（只有主管理員看得到）
  document.getElementById('approvedSection').style.display = isMain ? '' : 'none';
  document.getElementById('subAdminSection').style.display = isMain ? '' : 'none';

  if(isMain){
    const app=allRecords.filter(r=>r.status==='approved').sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
    document.getElementById('approvedManage').innerHTML=app.map(r=>
      '<div class="pending-item"><div class="pending-info">'+
      '<div class="pending-date">📅 '+fd(r.date)+'</div>'+
      '<div class="pending-players-list">'+r.players.map(p=>p.n+' '+fmt(p.s)+'元').join(' ｜ ')+'</div></div>'+
      '<div class="pending-actions"><button class="btn-danger" onclick="delR(\''+r.id+'\')">🗑 刪除</button></div></div>').join('');

    await loadSubAdmins();
    document.getElementById('subAdminList').innerHTML = subAdmins.length
      ? subAdmins.map(e=>
          '<div class="pending-item"><div class="pending-info"><div class="pending-date" style="color:var(--cream)">'+e+'</div></div>'+
          '<div class="pending-actions"><button class="btn-danger" onclick="removeSubAdmin(\''+e+'\')" >移除</button></div></div>'
        ).join('')
      : '<div style="color:rgba(245,237,214,0.35);font-size:0.88rem;padding:0.5rem">尚無副管理員</div>';
  }
}
async function approveR(pendingId,date,players){
  try{
    await db.collection('records').add({date,players,status:'approved',createdAt:new Date().toISOString()});
    await db.collection('pending').doc(pendingId).delete();
    toast('✅ 已批准');await loadRecords();await renderAdmin();
  }catch(e){toast('失敗：'+e.message);}
}
async function rejectR(id){await db.collection('pending').doc(id).delete();toast('已拒絕');await renderAdmin();}
async function delR(id){if(!confirm('確認刪除？'))return;await db.collection('records').doc(id).delete();toast('已刪除');await loadRecords();await renderAdmin();}

// ── Toast ──
let _tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2800);}

// ── Init ──
renderForm();
seedIfEmpty().catch(e=>{console.error(e);hideLoading();toast('連線失敗：'+e.message);});
</script>
</body>
